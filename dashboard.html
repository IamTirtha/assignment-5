<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashbord</title>
    <!-- Linked DaisyUI and tailwindcss -->
        <link
        href="https://cdn.jsdelivr.net/npm/daisyui@5"
        rel="stylesheet"
        type="text/css"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- Font awesome Linked -->
        <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"
        />

        <!-- Linked font here -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
        href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&family=Baloo+Da+2:wght@400..800&family=Luckiest+Guy&family=Manrope:wght@200..800&family=Momo+Trust+Display&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
</head>
    <body>
        <section id="navbar">
            <div class="navbar bg-base-100 shadow-sm flex justify-around">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl"><img src="./assets/github-logo.png" alt="Logo" class="h-10 w-10"> Github Issue Tracker</a>
            </div>
            <div class="flex gap-2 items-center">
                <i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Search issues.." class="input input-bordered w-24 md:w-auto" />
                <button id="issueBtn" class="p-4 border-none rounded text-white bg-[#4A00FF] hover:bg-[#3704b9]">+ New Issue</button>
            </div>
        </div>
        </section>

        <section id="counting-sec">
            <div class="bg-gray-100 px-6 py-4 flex justify-between items-center rounded-lg">

                <!-- Left Section -->
                <div class="flex items-center gap-4">
                    
                    <!-- Icon -->
                    <div class="bg-purple-100 p-3 rounded-full">
                    <!-- simple icon -->
                    <img src="./assets/Aperture.png" class="w-6 h-6 text-purple-600"/>
                    
                    </div>

                    <!-- Text -->
                    <div>
                    <h2 id="issue-count" class="text-xl font-semibold text-gray-800">
                        <!-- Empty space for updating  -->
                    </h2>
                    <p class="text-sm text-gray-500">
                        Track and manage your project issues
                    </p>
                    </div>

                </div>

                <!-- Right Section -->
                <div class="flex items-center gap-6 text-sm">

                    <!-- Open -->
                    <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                    <span class="text-gray-700">Open</span>
                    </div>

                    <!-- Closed -->
                    <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-purple-500 rounded-full"></div>
                    <span class="text-gray-700">Closed</span>
                    </div>

                </div>

                </div>
        </section>

        <section id="main" class="bg-gray-100 p-5">
            <button id="all-btn" class="tab-btn px-4 py-2 text-gray-700 border border-gray-500 rounded-xl hover:bg-[#4A00FF] hover:text-white cursor-pointer">All</button>
            <button id="open-btn" class="tab-btn px-4 py-2 text-gray-700 border border-gray-500 rounded-xl hover:bg-[#4A00FF] hover:text-white cursor-pointer">Open</button>
            <button id="closed-btn" class="tab-btn px-4 py-2 text-gray-700 border border-gray-500 rounded-xl  hover:bg-[#4A00FF] hover:text-white cursor-pointer">Closed</button>
        </section>
        <!-- Empty container for card -->
        <div id="issue-container" class=" grid grid-cols-4 gap-4 mt-6">

        </div>

        <section>
            <!-- Open the modal using ID.showModal() method -->
            <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
                <div class="modal-box">
                    <div id="details-box">

                    </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </dialog>
        </section>

        <!-- <script src="script.js"></script> -->
        <script src="./js/api.js"></script>
        <script src="./js/ui.js"></script>
        <script src="./js/filter.js"></script>
        <script src="./js/buttonfuncionality.js"></script>
    </body>
</html>
